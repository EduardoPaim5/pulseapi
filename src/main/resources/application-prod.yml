server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
    com.fluentia.pulseapi.infrastructure.config.MonitorCheckScheduler: INFO

app:
  scheduler:
    enabled: ${APP_SCHEDULER_ENABLED:true}
    claim-batch-size: ${APP_SCHEDULER_CLAIM_BATCH_SIZE:50}
    claim-lease-seconds: ${APP_SCHEDULER_CLAIM_LEASE_SECONDS:120}
    max-parallel-checks: ${APP_SCHEDULER_MAX_PARALLEL_CHECKS:4}
  security:
    allow-private-targets: ${APP_SECURITY_ALLOW_PRIVATE_TARGETS:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
