spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulseapi}
    username: ${DB_USER:pulseapi}
    password: ${DB_PASSWORD:pulseapi}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: INFO

app:
  scheduler:
    claim-batch-size: 50
    claim-lease-seconds: 120
    max-parallel-checks: 4
  security:
    allow-private-targets: true
