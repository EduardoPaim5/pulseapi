version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseapi-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-pulseapi}
      POSTGRES_USER: ${DB_USER:-pulseapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pulseapi}
    ports:
      - "5432:5432"
    volumes:
      - pulseapi_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pulseapi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pulseapi.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pulseapi_pgdata:
